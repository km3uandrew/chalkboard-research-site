  <line x1="10" y1="2" x2="22" y2="2" stroke="#2b2b2b" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="8" y="8" width="16" height="16" fill="#56B4E9" stroke="#56B4E9" stroke-width="1.8"/>
  <line x1="8" y1="16" x2="24" y2="16" stroke="#2b2b2b" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="24" x2="16" y2="30" stroke="#2b2b2b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="30" x2="22" y2="30" stroke="#2b2b2b" stroke-width="1.5" stroke-linecap="round"/>
</svg>
