<!-- Proton Mail email signature. Paste into the signature editor's HTML/source
     mode (visual mode would show this as literal text). Both the width/height
     attributes and the inline width style are required — clients differ on
     which they honor, and setting both is what prevents the image blowing up.
     Logo aspect ratio is 548:96; to resize, height = width * 96 / 548. -->
<table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
  <tr>
    <td style="padding:0 0 10px 0;">
      <img src="https://chalkboard-research.com/signature/signature-logo-2x.png"
           alt="Chalkboard Research"
           width="400" height="70"
           style="display:block; width:400px; max-width:100%; height:auto; border:0;">
    </td>
  </tr>
  <tr>
    <td style="font-family:Helvetica, Arial, sans-serif; font-size:14px; line-height:1.5; color:#2b2b2b; padding:0;">
      Kary Myers, PhD<br>
      <a href="mailto:kary@chalkboard-research.com"
         style="color:#009E73; text-decoration:none;">kary@chalkboard-research.com</a><br>
      Santa Fe, New Mexico
    </td>
  </tr>
</table>
