<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chalkboard Research</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <!-- Open Graph / link preview metadata -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://chalkboard-research.com/">
  <meta property="og:title" content="Chalkboard Research">
  <meta property="og:description" content="I collaborate with local businesses, nonprofits, public agencies, and newsrooms to turn their data into understanding that supports real decisions.">
  <meta property="og:image" content="https://chalkboard-research.com/og-image-v2.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter Card (also used as fallback by some platforms) -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Chalkboard Research">
  <meta name="twitter:description" content="I collaborate with local businesses, nonprofits, public agencies, and newsrooms to turn their data into understanding that supports real decisions.">
  <meta name="twitter:image" content="https://chalkboard-research.com/og-image-v2.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&family=Lora:wght@400&display=swap');

    :root {
      --charcoal: #2b2b2b;
      --mid-gray: #8a8a8a;
      --readable-gray: #4a4a4a;
      --blue: #56B4E9;
      --pink: #CC79A7;
      --green: #009E73;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      color: var(--charcoal);
      font-family: 'Josefin Sans', 'Futura', 'Century Gothic', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 24px;
    }

    .card {
      max-width: 760px;
      width: 100%;
    }

    /* ── Logo lockup ── */
    .lockup {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 24px;
      margin-bottom: 48px;
    }

    .mark svg {
      display: block;
      width: 100px;
      height: auto;
      flex-shrink: 0;
    }

    .wordmark {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .name {
      font-weight: 600;
      font-size: clamp(22px, 5.5vw, 36px);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      line-height: 1.15;
      color: var(--charcoal);
      white-space: nowrap;
    }

    .name .sm {
      font-size: 0.32em;
      font-weight: 400;
      letter-spacing: 0;
      vertical-align: super;
      margin-left: 0.15em;
      color: var(--readable-gray);
    }

    .tagline {
      font-weight: 400;
      font-size: clamp(11px, 2vw, 14px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--readable-gray);
      margin-top: 4px;
      padding-left: 5px;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: #e0e0e0;
      margin-bottom: 36px;
    }

    /* ── Body text ── */
    .body-text {
      font-family: 'Lora', Georgia, serif;
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1.75;
      color: var(--readable-gray);
      margin-bottom: 36px;
    }

    /* ── Contact ── */
    .name-line {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--charcoal);
      margin-bottom: 8px;
    }

    .contact {
      font-size: 15px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .contact a {
      color: var(--green);
      text-decoration: none;
      border-bottom: 1px solid var(--green);
      padding-bottom: 1px;
    }

    .contact a:hover {
      color: var(--charcoal);
      border-bottom-color: var(--charcoal);
    }

    /* ── Location ── */
    .location {
      margin-top: 22px;
      font-size: 14px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--readable-gray);
    }

    /* ── Footer ── */
    .footer {
      margin-top: 64px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #c0c0c0;
    }

    /* ── Narrow screens: center the lockup once it wraps ── */
    @media (max-width: 480px) {
      .lockup {
        justify-content: center;
        text-align: center;
      }

      .mark svg {
        margin: 0 auto;
      }

      .wordmark {
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Logo: Concept 2 — colored IQR box outlines, charcoal whiskers & median -->
    <div class="lockup">
      <div class="mark">
        <svg width="112" height="95" viewBox="0 0 112 95" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Left boxplot — pink IQR box, charcoal whiskers + median -->
          <line x1="19.6" y1="14"    x2="19.6"  y2="24.22" stroke="#2b2b2b" stroke-width="1.96" stroke-linecap="round"/>
          <line x1="9.8"  y1="14"    x2="29.4"  y2="14"    stroke="#2b2b2b" stroke-width="1.96" stroke-linecap="round"/>
          <line x1="7"    y1="42"    x2="32.2"  y2="42"    stroke="#2b2b2b" stroke-width="1.96" stroke-linecap="round"/>
          <line x1="19.6" y1="65.38" x2="19.6"  y2="78.4"  stroke="#2b2b2b" stroke-width="1.96" stroke-linecap="round"/>
          <line x1="9.8"  y1="78.4"  x2="29.4"  y2="78.4"  stroke="#2b2b2b" stroke-width="1.96" stroke-linecap="round"/>
          <rect x="7"     y="25.2"   width="25.2" height="39.2" stroke="#CC79A7" stroke-width="1.96" fill="none"/>
          <!-- Center boxplot — blue IQR box -->
          <line x1="56"    y1="5.6"  x2="56"    y2="18.55" stroke="#2b2b2b" stroke-width="2.1"  stroke-linecap="round"/>
          <line x1="43.4"  y1="5.6"  x2="68.6"  y2="5.6"   stroke="#2b2b2b" stroke-width="2.1"  stroke-linecap="round"/>
          <line x1="40.6" y1="43.4" x2="71.4"  y2="43.4"  stroke="#2b2b2b" stroke-width="2.1"  stroke-linecap="round"/>
          <line x1="56"    y1="73.85" x2="56"   y2="88.2"  stroke="#2b2b2b" stroke-width="2.1"  stroke-linecap="round"/>
          <line x1="43.4"  y1="88.2" x2="68.6"  y2="88.2"  stroke="#2b2b2b" stroke-width="2.1"  stroke-linecap="round"/>
          <rect x="40.6"   y="19.6"  width="30.8" height="53.2" stroke="#56B4E9" stroke-width="2.1"  fill="none"/>
          <!-- Right boxplot — green IQR box -->
          <line x1="92.4"  y1="16.8" x2="92.4"  y2="27.02" stroke="#2b2b2b" stroke-width="1.96" stroke-linecap="round"/>
          <line x1="82.6"  y1="16.8" x2="102.2" y2="16.8"  stroke="#2b2b2b" stroke-width="1.96" stroke-linecap="round"/>
          <line x1="79.8" y1="46.2" x2="105"   y2="46.2"  stroke="#2b2b2b" stroke-width="1.96" stroke-linecap="round"/>
          <line x1="92.4"  y1="62.58" x2="92.4" y2="75.6"  stroke="#2b2b2b" stroke-width="1.96" stroke-linecap="round"/>
          <line x1="82.6"  y1="75.6" x2="102.2" y2="75.6"  stroke="#2b2b2b" stroke-width="1.96" stroke-linecap="round"/>
          <rect x="79.8"   y="28"    width="25.2" height="33.6" stroke="#009E73" stroke-width="1.96" fill="none"/>
        </svg>
      </div>
      <div class="wordmark">
        <div class="name">Chalkboard Research<span class="sm">℠</span></div>
        <div class="tagline">Drawing Insights from Your Data</div>
      </div>
    </div>

    <div class="divider"></div>

    <p class="body-text">
      I collaborate with local businesses, nonprofits, public agencies,
      and newsrooms to turn their data into understanding that supports
      real decisions.
    </p>

    <div class="contact">
      <p class="name-line">Kary Myers, PhD</p>
      <a href="mailto:kary@chalkboard-research.com">kary@chalkboard-research.com</a>
    </div>

    <p class="location">Santa Fe, New Mexico</p>

    <p class="footer">Chalkboard Research LLC</p>

  </div>
</body>
</html>
