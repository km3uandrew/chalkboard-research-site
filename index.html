<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chalkboard Research</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap');

    :root {
      --charcoal: #2b2b2b;
      --warm-white: #f5f2ec;
      --mid-gray: #8a8a8a;
      --blue: #56B4E9;
      --pink: #CC79A7;
      --green: #009E73;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--warm-white);
      color: var(--charcoal);
      font-family: 'Josefin Sans', 'Futura', 'Century Gothic', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 24px;
    }

    .card {
      max-width: 520px;
      width: 100%;
    }

    /* ── Logo lockup ── */
    .lockup {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 36px;
    }

    .mark svg { display: block; }

    .wordmark {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .name {
      font-weight: 600;
      font-size: 26px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1;
      color: var(--charcoal);
    }

    .tagline {
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--mid-gray);
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: #d8d3c8;
      margin-bottom: 28px;
    }

    /* ── Body text ── */
    .body-text {
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.04em;
      line-height: 1.85;
      color: var(--mid-gray);
      margin-bottom: 28px;
    }

    /* ── Contact ── */
    .name-line {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--charcoal);
      margin-bottom: 6px;
    }

    .contact {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .contact a {
      color: var(--green);
      text-decoration: none;
      border-bottom: 1px solid var(--green);
      padding-bottom: 1px;
    }

    .contact a:hover {
      color: var(--charcoal);
      border-bottom-color: var(--charcoal);
    }

    /* ── Location ── */
    .location {
      margin-top: 16px;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mid-gray);
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Logo: Concept 2 — colored IQR box outlines, charcoal whiskers & median -->
    <div class="lockup">
      <div class="mark">
        <svg width="80" height="68" viewBox="0 0 80 68" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Left boxplot — pink IQR box, charcoal whiskers + median -->
          <line x1="14" y1="10" x2="14" y2="18" stroke="#2b2b2b" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="7"  y1="10" x2="21" y2="10" stroke="#2b2b2b" stroke-width="1.4" stroke-linecap="round"/>
          <rect x="5"  y="18" width="18" height="28" stroke="#CC79A7" stroke-width="1.8" fill="none"/>
          <line x1="5"  y1="30" x2="23" y2="30" stroke="#2b2b2b" stroke-width="2" stroke-linecap="round"/>
          <line x1="14" y1="46" x2="14" y2="56" stroke="#2b2b2b" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="7"  y1="56" x2="21" y2="56" stroke="#2b2b2b" stroke-width="1.4" stroke-linecap="round"/>
          <!-- Center boxplot — blue IQR box -->
          <line x1="40" y1="4"  x2="40" y2="14" stroke="#2b2b2b" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="31" y1="4"  x2="49" y2="4"  stroke="#2b2b2b" stroke-width="1.5" stroke-linecap="round"/>
          <rect x="29" y="14" width="22" height="38" stroke="#56B4E9" stroke-width="1.8" fill="none"/>
          <line x1="29" y1="31" x2="51" y2="31" stroke="#2b2b2b" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="40" y1="52" x2="40" y2="63" stroke="#2b2b2b" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="31" y1="63" x2="49" y2="63" stroke="#2b2b2b" stroke-width="1.5" stroke-linecap="round"/>
          <!-- Right boxplot — green IQR box -->
          <line x1="66" y1="12" x2="66" y2="20" stroke="#2b2b2b" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="59" y1="12" x2="73" y2="12" stroke="#2b2b2b" stroke-width="1.4" stroke-linecap="round"/>
          <rect x="57" y="20" width="18" height="24" stroke="#009E73" stroke-width="1.8" fill="none"/>
          <line x1="57" y1="33" x2="75" y2="33" stroke="#2b2b2b" stroke-width="2" stroke-linecap="round"/>
          <line x1="66" y1="44" x2="66" y2="54" stroke="#2b2b2b" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="59" y1="54" x2="73" y2="54" stroke="#2b2b2b" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="wordmark">
        <div class="name">Chalkboard Research</div>
        <div class="tagline">Drawing Insights from Your Data</div>
      </div>
    </div>

    <div class="divider"></div>

    <p class="body-text">
      I collaborate with local businesses, nonprofits, public agencies,
      and newsrooms to turn their data into understanding that supports
      real decisions.
    </p>

    <div class="contact">
      <p class="name-line">Kary Myers, PhD</p>
      <a href="mailto:kary@chalkboard-research.com">kary@chalkboard-research.com</a>
    </div>

    <p class="location">Santa Fe, New Mexico</p>

  </div>
</body>
</html>
